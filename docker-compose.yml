name: syj-mail-intelligence

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: syj
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: syj_mail
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syj -d syj_mail"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    # No ports published to the host — only reachable from other containers
    # on the internal network. Remove this restriction only if you need to
    # connect a DB client from outside Docker.

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DATABASE_URL: postgresql://syj:${POSTGRES_PASSWORD}@postgres:5432/syj_mail
      API_KEY: ${API_KEY:?set API_KEY in .env}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:3000}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_HOST: ${OLLAMA_HOST:-http://host.docker.internal:11434}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:14b}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-qwen2.5:7b}
      AUTO_SEND_THRESHOLD: ${AUTO_SEND_THRESHOLD:-95}
      APPROVAL_THRESHOLD: ${APPROVAL_THRESHOLD:-80}
      IMPORTANCE_NOTIFY_THRESHOLD: ${IMPORTANCE_NOTIFY_THRESHOLD:-70}
      GMAIL_POLL_INTERVAL_SECONDS: ${GMAIL_POLL_INTERVAL_SECONDS:-60}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    volumes:
      # Gmail OAuth artifacts — generate these once outside Docker (see
      # README "First-time Gmail auth" section) then mount read-only.
      - ./credentials.json:/app/credentials.json:ro
      - ./token.json:/app/token.json:ro
    networks: [internal, public]
    # Not published directly — nginx proxies to it. Uncomment for direct
    # local debugging only:
    # ports: ["8000:8000"]

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_API_URL: http://backend:8000
      BACKEND_API_KEY: ${API_KEY:?set API_KEY in .env}
    networks: [internal, public]
    # ports: ["3000:3000"]   # uncomment for direct local debugging

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on: [backend, dashboard]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    networks: [public]

networks:
  internal:
    internal: true   # postgres is unreachable from outside this compose stack
  public:

volumes:
  postgres_data:
  certbot_www:
  certbot_conf:
