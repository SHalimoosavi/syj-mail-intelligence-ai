# Replace mail.yourdomain.com with your real domain before deploying.
# See deploy/README.md for the certbot steps that issue the certificate
# these paths reference.

server {
    listen 80;
    server_name mail.yourdomain.com;

    # Required for certbot's HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else redirects to HTTPS once a certificate exists.
    # Comment this out for the very first run (before you have a cert),
    # so certbot's challenge above is reachable over plain HTTP.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name mail.yourdomain.com;

    ssl_certificate     /etc/letsencrypt/live/mail.yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.yourdomain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Dashboard (Next.js) — the default destination
    location / {
        proxy_pass http://dashboard:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Direct backend access (only if you need to call the API from outside
    # the dashboard, e.g. a mobile client). Requires the X-API-Key header on
    # every request — see app/core/auth.py. Remove this block entirely if
    # the dashboard is the only consumer; that's the safer default.
    location /api/direct/ {
        rewrite ^/api/direct/(.*)$ /$1 break;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
