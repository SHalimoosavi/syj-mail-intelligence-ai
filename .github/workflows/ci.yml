name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: syj
          POSTGRES_PASSWORD: ci_test_password
          POSTGRES_DB: syj_mail_ci
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U syj -d syj_mail_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Compile check (catches syntax errors before they ship)
        run: python -m compileall app config main.py

      - name: Run Alembic migrations against a real Postgres
        env:
          DATABASE_URL: postgresql://syj:ci_test_password@localhost:5432/syj_mail_ci
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql://syj:ci_test_password@localhost:5432/syj_mail_ci
          ENVIRONMENT: development
        run: pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check + build
        run: npm run build
